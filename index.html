<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Language Learning Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="dark-mode">

<header>
    <div class="logo">LINGUA HUB</div>
    <h1>Explore the World of Languages</h1>
    <p class="subtitle">새로운 언어를 배우는 가장 세련된 방법. 단어부터 문법, 회화까지 한 번에 마스터하세요.</p>
</header>

<main>
    <div class="grid-container">
        <language-card lang-id="korean"></language-card>
        <language-card lang-id="english"></language-card>
        <language-card lang-id="chinese"></language-card>
        <language-card lang-id="japanese"></language-card>
    </div>

    <section id="lesson-section" class="lesson-view">
        <lesson-hub></lesson-hub>
    </section>
</main>

<footer>
    <p>&copy; 2026 Global Language Learning Hub. <br> Modern Web Experience with Web Components.</p>
</footer>

<script src="main.js"></script>
</body>
</html>
